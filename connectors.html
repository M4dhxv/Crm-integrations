<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connect your CRM tools to CRM Hub.">
    <title>Connectors — CRM Hub</title>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div class="app-layout">
        <div id="app-nav"></div>

        <main class="app-main">
            <header class="page-header">
                <h1 class="page-title">Connectors</h1>
                <p class="page-subtitle">Select a CRM provider to configure sync settings and authenticate.</p>
            </header>

            <div class="provider-grid" id="provider-grid">
                <!-- Provider cards generated by connectors.js -->
                <div class="loading-overlay">
                    <span class="spinner"></span> Loading providers...
                </div>
            </div>
        </main>
    </div>

    <!-- Sliding Configuration Panel -->
    <div class="panel-overlay" id="panel-overlay"></div>
    <div class="config-panel" id="config-panel">
        <!-- Inner content populated by JS -->
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="/connectors.js"></script>
</body>

</html>
