<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connect your CRM tools to CRM Hub.">
    <title>Connectors — CRM Hub</title>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div class="app-layout">
        <div id="app-nav"></div>

        <main class="app-main">
            <header class="ds-hero">
                <div class="ds-hero-top">
                    <div>
                        <h1 class="ds-title">Data Sources</h1>
                        <p class="ds-subtitle">Connect your CRMs and revenue tools to unify contacts, deals, and activity data in one place.</p>
                    </div>
                    <button class="ds-wizard-btn" type="button">Connection Wizard</button>
                </div>
                <div class="ds-badges">
                    <span class="ds-badge" id="connected-count">0 Connected</span>
                    <span class="ds-badge" id="available-count">4 Available</span>
                </div>
            </header>

            <div class="provider-grid" id="provider-grid">
                <!-- Provider cards generated by connectors.js -->
                <div class="loading-overlay">
                    <span class="spinner"></span> Loading providers...
                </div>
            </div>
        </main>
    </div>

    <!-- Sliding Configuration Panel -->
    <div class="panel-overlay" id="panel-overlay"></div>
    <div class="config-panel" id="config-panel">
        <!-- Inner content populated by JS -->
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="/connectors.js"></script>
</body>

</html>
